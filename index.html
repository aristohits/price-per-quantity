<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>เปรียบเทียบราคาต่อปริมาณ</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="bg-white rounded-2xl shadow-lg p-6 w-full max-w-3xl">
    <h1 class="text-2xl font-bold text-center mb-2">
      🔍 เปรียบเทียบราคาต่อปริมาณ
    </h1>
    <p class="text-center text-gray-500 mb-6">
      ช่วยเลือกสินค้าที่คุ้มที่สุด
    </p>

    <!-- Form -->
    <form id="compareForm" onsubmit="event.preventDefault(); comparePrice();">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- Product A -->
        <div class="border rounded-xl p-4">
          <h2 class="font-semibold mb-3 text-blue-700">สินค้า A</h2>
          <label for="priceA" class="sr-only">ราคา สินค้า A</label>
          <input id="priceA" type="number" placeholder="ราคา (บาท)" step="0.01" min="0" inputmode="decimal" required
            class="w-full mb-2 p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none" />
          
          <label for="qtyA" class="sr-only">ปริมาณ สินค้า A</label>
          <input id="qtyA" type="number" placeholder="ปริมาณ" step="any" min="0.0001" inputmode="decimal" required
            class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none" />
        </div>

        <!-- Product B -->
        <div class="border rounded-xl p-4">
          <h2 class="font-semibold mb-3 text-blue-700">สินค้า B</h2>
          <label for="priceB" class="sr-only">ราคา สินค้า B</label>
          <input id="priceB" type="number" placeholder="ราคา (บาท)" step="0.01" min="0" inputmode="decimal" required
            class="w-full mb-2 p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none" />
          
          <label for="qtyB" class="sr-only">ปริมาณ สินค้า B</label>
          <input id="qtyB" type="number" placeholder="ปริมาณ" step="any" min="0.0001" inputmode="decimal" required
            class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none" />
        </div>
      </div>

      <!-- Error Message -->
      <p id="errorMessage" class="hidden mt-4 text-center text-red-500 text-sm font-medium"></p>

      <!-- Button -->
      <button type="submit"
        class="mt-6 w-full bg-blue-600 text-white py-3 rounded-xl hover:bg-blue-700 transition shadow-md active:scale-[0.98]">
        🔄 คำนวณเปรียบเทียบ
      </button>
    </form>

    <!-- Result -->
    <div id="result" class="mt-6 hidden p-4 rounded-xl bg-gray-50">
      <p id="resultA"></p>
      <p id="resultB"></p>
      <p id="winner" class="font-semibold mt-2"></p>
    </div>
  </div>

  <script>
    function comparePrice() {
      const priceA = parseFloat(document.getElementById("priceA").value);
      const qtyA = parseFloat(document.getElementById("qtyA").value);
      const priceB = parseFloat(document.getElementById("priceB").value);
      const qtyB = parseFloat(document.getElementById("qtyB").value);

      const errorEl = document.getElementById("errorMessage");
      const resultEl = document.getElementById("result");
      
      // Reset state
      errorEl.classList.add("hidden");
      resultEl.classList.add("hidden");

      // Validation
      if (isNaN(priceA) || isNaN(qtyA) || isNaN(priceB) || isNaN(qtyB)) {
        showError("กรุณากรอกข้อมูลให้ครบถ้วน");
        return;
      }

      if (qtyA <= 0 || qtyB <= 0) {
        showError("ปริมาณต้องมากกว่า 0");
        return;
      }

      if (priceA < 0 || priceB < 0) {
        showError("ราคาไม่สามารถติดลบได้");
        return;
      }

      const unitA = priceA / qtyA;
      const unitB = priceB / qtyB;

      resultEl.classList.remove("hidden");
      document.getElementById("resultA").innerText =
        `สินค้า A: ${unitA.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 4})} บาท / หน่วย`;
      document.getElementById("resultB").innerText =
        `สินค้า B: ${unitB.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 4})} บาท / หน่วย`;

      const winner = document.getElementById("winner");

      if (unitA < unitB) {
        winner.innerText = "✅ สินค้า A คุ้มกว่าครับ";
        winner.className = "font-semibold mt-2 text-green-600";
      } else if (unitB < unitA) {
        winner.innerText = "✅ สินค้า B คุ้มกว่าครับ";
        winner.className = "font-semibold mt-2 text-green-600";
      } else {
        winner.innerText = "⚖️ ราคาพอๆ กันครับ";
        winner.className = "font-semibold mt-2 text-yellow-600";
      }
    }

    function showError(msg) {
      const errorEl = document.getElementById("errorMessage");
      errorEl.innerText = msg;
      errorEl.classList.remove("hidden");
    }
  </script>

</body>
</html>

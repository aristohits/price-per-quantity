<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#020617">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1048/1048953.png">
  <title>เปรียบเทียบราคาต่อหน่วย</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center p-4 font-sans text-slate-300">

  <div class="bg-slate-900 rounded-3xl shadow-2xl p-8 w-full max-w-2xl border border-slate-800 relative">
    
    <header class="text-center mb-10">
      <div class="inline-flex items-center justify-center p-3 bg-indigo-900/30 rounded-2xl mb-4">
        <span class="text-3xl">⚖️</span>
      </div>
      <h1 class="text-3xl font-extrabold text-white tracking-tight">
        เปรียบเทียบราคาต่อหน่วย
      </h1>
      <p class="text-slate-400 mt-2 font-medium">
        ช่วยคุณเลือกสินค้าที่คุ้มค่าที่สุดในไม่กี่วินาที
      </p>
    </header>

    <!-- Form -->
    <form id="compareForm" onsubmit="event.preventDefault(); comparePrice();" class="space-y-8">
      <div id="productContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Product A -->
        <div id="cardA" class="bg-slate-800/50 rounded-2xl p-5 border border-slate-700 transition-all hover:border-indigo-500 group relative">
          <h2 class="font-bold mb-4 text-indigo-400 flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-indigo-500"></span>
            สินค้า A
          </h2>
          <div class="space-y-3">
            <div>
              <label for="priceA" class="block text-xs font-semibold text-slate-400 mb-1 ml-1">ราคา สินค้า A</label>
              <div class="relative">
                <input id="priceA" type="number" placeholder="ราคา (บาท)" step="0.01" min="0" inputmode="decimal" required
                  class="w-full p-3 pr-12 bg-slate-800 border border-slate-700 rounded-xl focus:ring-4 focus:ring-indigo-900/30 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-500 font-medium text-white" />
                <button type="button" onclick="openCalculator('priceA')" class="absolute right-2 top-1/2 -translate-y-1/2 p-2 hover:bg-slate-700 rounded-lg transition-colors text-indigo-400" title="เปิดเครื่องคิดเลข">
                  <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                  </svg>
                </button>
              </div>
            </div>
            
            <div>
              <label for="qtyA" class="block text-xs font-semibold text-slate-400 mb-1 ml-1">ปริมาณ สินค้า A</label>
              <div class="relative">
                <input id="qtyA" type="number" placeholder="ปริมาณ" step="any" min="0.0001" inputmode="decimal" required
                  class="w-full p-3 pr-12 bg-slate-800 border border-slate-700 rounded-xl focus:ring-4 focus:ring-indigo-900/30 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-500 font-medium text-white" />
                <button type="button" onclick="openCalculator('qtyA')" class="absolute right-2 top-1/2 -translate-y-1/2 p-2 hover:bg-slate-700 rounded-lg transition-colors text-indigo-400" title="เปิดเครื่องคิดเลข">
                  <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Product B -->
        <div id="cardB" class="bg-slate-800/50 rounded-2xl p-5 border border-slate-700 transition-all hover:border-emerald-500 group relative">
          <h2 class="font-bold mb-4 text-emerald-400 flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
            สินค้า B
          </h2>
          <div class="space-y-3">
            <div>
              <label for="priceB" class="block text-xs font-semibold text-slate-400 mb-1 ml-1">ราคา สินค้า B</label>
              <div class="relative">
                <input id="priceB" type="number" placeholder="ราคา (บาท)" step="0.01" min="0" inputmode="decimal" required
                  class="w-full p-3 pr-12 bg-slate-800 border border-slate-700 rounded-xl focus:ring-4 focus:ring-emerald-900/30 focus:border-emerald-500 outline-none transition-all placeholder:text-slate-500 font-medium text-white" />
                <button type="button" onclick="openCalculator('priceB')" class="absolute right-2 top-1/2 -translate-y-1/2 p-2 hover:bg-slate-700 rounded-lg transition-colors text-emerald-400" title="เปิดเครื่องคิดเลข">
                  <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                  </svg>
                </button>
              </div>
            </div>
            
            <div>
              <label for="qtyB" class="block text-xs font-semibold text-slate-400 mb-1 ml-1">ปริมาณ สินค้า B</label>
              <div class="relative">
                <input id="qtyB" type="number" placeholder="ปริมาณ" step="any" min="0.0001" inputmode="decimal" required
                  class="w-full p-3 pr-12 bg-slate-800 border border-slate-700 rounded-xl focus:ring-4 focus:ring-emerald-900/30 focus:border-emerald-500 outline-none transition-all placeholder:text-slate-500 font-medium text-white" />
                <button type="button" onclick="openCalculator('qtyB')" class="absolute right-2 top-1/2 -translate-y-1/2 p-2 hover:bg-slate-700 rounded-lg transition-colors text-emerald-400" title="เปิดเครื่องคิดเลข">
                  <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Add Product Button -->
      <div class="flex justify-center mt-2">
        <button type="button" onclick="addProduct()" class="group flex items-center gap-2 px-6 py-3 bg-slate-800 border border-slate-700 rounded-2xl text-slate-400 hover:text-white hover:border-indigo-500 hover:bg-slate-800/80 transition-all font-bold text-sm">
          <span class="w-6 h-6 rounded-lg bg-slate-700 group-hover:bg-indigo-600 flex items-center justify-center text-white transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
          </span>
          เพิ่มสินค้าสำหรับเปรียบเทียบ
        </button>
      </div>

      <!-- Error Message -->
      <div id="errorMessage" class="hidden p-4 rounded-xl bg-red-900/20 border border-red-900/30 text-red-400 text-sm font-semibold text-center"></div>

      <!-- Buttons -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <button type="submit"
          class="w-full bg-indigo-600 text-white py-4 rounded-2xl hover:bg-indigo-500 active:scale-[0.98] transition-all font-bold text-lg flex items-center justify-center gap-2 shadow-lg shadow-indigo-900/20">
          <span>🔄</span>
          คำนวณเปรียบเทียบ
        </button>
        <button type="button" onclick="resetForm()"
          class="w-full bg-slate-800 text-slate-300 py-4 rounded-2xl hover:bg-slate-700 active:scale-[0.98] transition-all font-bold text-lg flex items-center justify-center gap-2 border border-slate-700">
          <span>🗑️</span>
          ล้างข้อมูล
        </button>
      </div>
    </form>

    <!-- Result -->
    <div id="result" class="mt-10 hidden p-6 rounded-2xl bg-indigo-950/30 border border-indigo-900/50">
      <div id="resultList" class="space-y-3 mb-6">
        <!-- Result items will be injected here -->
      </div>
      <div id="winner" class="p-4 rounded-xl font-bold text-center text-lg shadow-sm"></div>
    </div>
  </div>

  <!-- Calculator Modal -->
  <div id="calculatorModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
    <div class="bg-slate-900 border border-slate-800 w-full max-w-xs rounded-3xl shadow-2xl overflow-hidden animate-scale-up">
      <div class="p-6 bg-slate-800/50">
        <div class="flex justify-between items-center mb-4">
          <span class="text-xs font-bold text-indigo-400 uppercase tracking-wider">เครื่องคิดเลข</span>
          <button onclick="closeCalculator()" class="text-slate-500 hover:text-white transition-colors text-xl font-bold">&times;</button>
        </div>
        <div id="calcDisplay" class="bg-slate-950 p-4 rounded-2xl text-right text-2xl font-mono text-white break-all min-h-[4rem] flex items-center justify-end shadow-inner border border-slate-800">0</div>
      </div>
      <div class="p-6 grid grid-cols-4 gap-3">
        <!-- Row 1 -->
        <button onclick="calcClear()" class="col-span-2 bg-red-900/20 text-red-400 p-4 rounded-xl font-bold hover:bg-red-900/30 active:scale-95 transition-all">AC</button>
        <button onclick="calcClick('/')" class="bg-slate-800 text-indigo-400 p-4 rounded-xl font-bold hover:bg-slate-700 active:scale-95 transition-all">÷</button>
        <button onclick="calcClick('*')" class="bg-slate-800 text-indigo-400 p-4 rounded-xl font-bold hover:bg-slate-700 active:scale-95 transition-all">×</button>
        <!-- Row 2 -->
        <button onclick="calcClick('7')" class="bg-slate-800 text-white p-4 rounded-xl font-bold hover:bg-slate-700 active:scale-95 transition-all">7</button>
        <button onclick="calcClick('8')" class="bg-slate-800 text-white p-4 rounded-xl font-bold hover:bg-slate-700 active:scale-95 transition-all">8</button>
        <button onclick="calcClick('9')" class="bg-slate-800 text-white p-4 rounded-xl font-bold hover:bg-slate-700 active:scale-95 transition-all">9</button>
        <button onclick="calcClick('-')" class="bg-slate-800 text-indigo-400 p-4 rounded-xl font-bold hover:bg-slate-700 active:scale-95 transition-all">−</button>
        <!-- Row 3 -->
        <button onclick="calcClick('4')" class="bg-slate-800 text-white p-4 rounded-xl font-bold hover:bg-slate-700 active:scale-95 transition-all">4</button>
        <button onclick="calcClick('5')" class="bg-slate-800 text-white p-4 rounded-xl font-bold hover:bg-slate-700 active:scale-95 transition-all">5</button>
        <button onclick="calcClick('6')" class="bg-slate-800 text-white p-4 rounded-xl font-bold hover:bg-slate-700 active:scale-95 transition-all">6</button>
        <button onclick="calcClick('+')" class="bg-slate-800 text-indigo-400 p-4 rounded-xl font-bold hover:bg-slate-700 active:scale-95 transition-all">+</button>
        <!-- Row 4 -->
        <button onclick="calcClick('1')" class="bg-slate-800 text-white p-4 rounded-xl font-bold hover:bg-slate-700 active:scale-95 transition-all">1</button>
        <button onclick="calcClick('2')" class="bg-slate-800 text-white p-4 rounded-xl font-bold hover:bg-slate-700 active:scale-95 transition-all">2</button>
        <button onclick="calcClick('3')" class="bg-slate-800 text-white p-4 rounded-xl font-bold hover:bg-slate-700 active:scale-95 transition-all">3</button>
        <button onclick="calcEqual()" class="bg-indigo-600 text-white p-4 rounded-xl font-bold hover:bg-indigo-500 active:scale-95 transition-all row-span-2">=</button>
        <!-- Row 5 -->
        <button onclick="calcClick('0')" class="bg-slate-800 text-white p-4 rounded-xl font-bold hover:bg-slate-700 active:scale-95 transition-all col-span-2">0</button>
        <button onclick="calcClick('.')" class="bg-slate-800 text-white p-4 rounded-xl font-bold hover:bg-slate-700 active:scale-95 transition-all">.</button>
        
        <button onclick="applyCalc()" class="col-span-4 mt-2 bg-emerald-600 text-white py-4 rounded-xl font-bold hover:bg-emerald-500 active:scale-95 transition-all shadow-lg shadow-emerald-900/20">นำไปใช้</button>
      </div>
    </div>
  </div>

  <script>
    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('SW Registered!', reg))
          .catch(err => console.log('SW Failed!', err));
      });
    }

    let activeTargetInput = null;
    let calcExpression = '';
    let productCount = 2; // Default A and B
    const productColors = [
      { name: 'indigo', text: 'text-indigo-400', bg: 'bg-indigo-500', border: 'hover:border-indigo-500', ring: 'focus:ring-indigo-900/30', focusBorder: 'focus:border-indigo-500' },
      { name: 'emerald', text: 'text-emerald-400', bg: 'bg-emerald-500', border: 'hover:border-emerald-500', ring: 'focus:ring-emerald-900/30', focusBorder: 'focus:border-emerald-500' },
      { name: 'violet', text: 'text-violet-400', bg: 'bg-violet-500', border: 'hover:border-violet-500', ring: 'focus:ring-violet-900/30', focusBorder: 'focus:border-violet-500' },
      { name: 'amber', text: 'text-amber-400', bg: 'bg-amber-500', border: 'hover:border-amber-500', ring: 'focus:ring-amber-900/30', focusBorder: 'focus:border-amber-500' },
      { name: 'rose', text: 'text-rose-400', bg: 'bg-rose-500', border: 'hover:border-rose-500', ring: 'focus:ring-rose-900/30', focusBorder: 'focus:border-rose-500' },
      { name: 'cyan', text: 'text-cyan-400', bg: 'bg-cyan-500', border: 'hover:border-cyan-500', ring: 'focus:ring-cyan-900/30', focusBorder: 'focus:border-cyan-500' }
    ];

    function addProduct() {
      if (productCount >= 26) return; // Limit to Z
      
      const char = String.fromCharCode(65 + productCount);
      const color = productColors[productCount % productColors.length];
      
      const card = document.createElement('div');
      card.id = `card${char}`;
      card.className = `bg-slate-800/50 rounded-2xl p-5 border border-slate-700 transition-all ${color.border} group relative animate-scale-up`;
      
      card.innerHTML = `
        <button type="button" onclick="removeProduct('${char}')" class="absolute top-4 right-4 text-slate-500 hover:text-red-400 transition-colors p-1" title="ลบสินค้า">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
          </svg>
        </button>
        <h2 class="font-bold mb-4 ${color.text} flex items-center gap-2">
          <span class="w-2 h-2 rounded-full ${color.bg}"></span>
          สินค้า ${char}
        </h2>
        <div class="space-y-3">
          <div>
            <label for="price${char}" class="block text-xs font-semibold text-slate-400 mb-1 ml-1">ราคา สินค้า ${char}</label>
            <div class="relative">
              <input id="price${char}" type="number" placeholder="ราคา (บาท)" step="0.01" min="0" inputmode="decimal" required
                class="w-full p-3 pr-12 bg-slate-800 border border-slate-700 rounded-xl focus:ring-4 ${color.ring} ${color.focusBorder} outline-none transition-all placeholder:text-slate-500 font-medium text-white" />
              <button type="button" onclick="openCalculator('price${char}')" class="absolute right-2 top-1/2 -translate-y-1/2 p-2 hover:bg-slate-700 rounded-lg transition-colors ${color.text}" title="เปิดเครื่องคิดเลข">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                </svg>
              </button>
            </div>
          </div>
          <div>
            <label for="qty${char}" class="block text-xs font-semibold text-slate-400 mb-1 ml-1">ปริมาณ สินค้า ${char}</label>
            <div class="relative">
              <input id="qty${char}" type="number" placeholder="ปริมาณ" step="any" min="0.0001" inputmode="decimal" required
                class="w-full p-3 pr-12 bg-slate-800 border border-slate-700 rounded-xl focus:ring-4 ${color.ring} ${color.focusBorder} outline-none transition-all placeholder:text-slate-500 font-medium text-white" />
              <button type="button" onclick="openCalculator('qty${char}')" class="absolute right-2 top-1/2 -translate-y-1/2 p-2 hover:bg-slate-700 rounded-lg transition-colors ${color.text}" title="เปิดเครื่องคิดเลข">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                </svg>
              </button>
            </div>
          </div>
        </div>
      `;
      
      document.getElementById('productContainer').appendChild(card);
      productCount++;
      card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function removeProduct(char) {
      const card = document.getElementById(`card${char}`);
      if (card) {
        card.classList.add('opacity-0', 'scale-95');
        setTimeout(() => {
          card.remove();
          // We don't decrement productCount to avoid ID conflicts, 
          // but we could if we re-indexed everything. 
          // For now, keeping it simple: just remove.
        }, 200);
      }
    }

    function openCalculator(id) {
      activeTargetInput = id;
      calcExpression = '';
      updateCalcDisplay('0');
      document.getElementById('calculatorModal').classList.remove('hidden');
      document.getElementById('calculatorModal').classList.add('flex');
      window.addEventListener('keydown', handleCalcKeyboard);
    }

    function closeCalculator() {
      document.getElementById('calculatorModal').classList.add('hidden');
      document.getElementById('calculatorModal').classList.remove('flex');
      activeTargetInput = null;
      window.removeEventListener('keydown', handleCalcKeyboard);
    }

    function handleCalcKeyboard(e) {
      const key = e.key;
      if (/[0-9\+\-\*\/\.]/.test(key)) {
        calcClick(key);
      } else if (key === 'Enter' || key === '=') {
        calcEqual();
      } else if (key === 'Escape') {
        closeCalculator();
      } else if (key === 'Backspace') {
        calcExpression = calcExpression.slice(0, -1);
        updateCalcDisplay(calcExpression);
      } else if (key === 'c' || key === 'C') {
        calcClear();
      }
    }

    function calcClick(val) {
      if (calcExpression === 'Error' || calcExpression === 'Infinity') calcExpression = '';
      
      // Prevent multiple decimals in a single number
      if (val === '.') {
        const parts = calcExpression.split(/[\+\-\*\/]/);
        const lastPart = parts[parts.length - 1];
        if (lastPart.includes('.')) return;
      }
      
      calcExpression += val;
      updateCalcDisplay(calcExpression);
    }

    function calcClear() {
      calcExpression = '';
      updateCalcDisplay('0');
    }

    function calcEqual() {
      if (!calcExpression) return;
      try {
        const result = Function('"use strict";return (' + calcExpression + ')')();
        if (!isFinite(result)) {
          calcExpression = 'Infinity';
        } else {
          calcExpression = result.toString();
        }
        updateCalcDisplay(calcExpression);
      } catch (e) {
        calcExpression = 'Error';
        updateCalcDisplay('Error');
      }
    }

    function applyCalc() {
      calcEqual();
      const resultValue = parseFloat(calcExpression);
      if (!isNaN(resultValue) && isFinite(resultValue)) {
        const input = document.getElementById(activeTargetInput);
        input.value = resultValue;
        closeCalculator();
      }
    }

    function updateCalcDisplay(str) {
      document.getElementById('calcDisplay').innerText = str || '0';
    }

    // Existing App Logic
    function resetForm() {
      document.getElementById("compareForm").reset();
      document.getElementById("errorMessage").classList.add("hidden");
      document.getElementById("result").classList.add("hidden");
      
      // Remove all cards except A and B
      const container = document.getElementById('productContainer');
      const cards = container.querySelectorAll('[id^="card"]');
      cards.forEach(card => {
        const id = card.id.replace('card', '');
        if (id !== 'A' && id !== 'B') {
          card.remove();
        }
      });
      productCount = 2;
      
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function comparePrice() {
      const container = document.getElementById('productContainer');
      const cards = container.querySelectorAll('[id^="card"]');
      const products = [];
      const errorEl = document.getElementById("errorMessage");
      const resultEl = document.getElementById("result");
      const resultListEl = document.getElementById("resultList");
      const winnerEl = document.getElementById("winner");
      
      errorEl.classList.add("hidden");
      resultEl.classList.add("hidden");
      resultListEl.innerHTML = '';

      for (let card of cards) {
        const id = card.id.replace('card', '');
        const price = parseFloat(document.getElementById(`price${id}`).value);
        const qty = parseFloat(document.getElementById(`qty${id}`).value);

        if (isNaN(price) || isNaN(qty)) {
          showError("กรุณากรอกข้อมูลให้ครบถ้วน");
          return;
        }

        if (qty <= 0) {
          showError(`ปริมาณของสินค้า ${id} ต้องมากกว่า 0`);
          return;
        }

        if (price < 0) {
          showError(`ราคาของสินค้า ${id} ไม่สามารถติดลบได้`);
          return;
        }

        products.push({
          id: id,
          unitPrice: price / qty,
          colorClass: card.querySelector('h2').className.split(' ').find(c => c.startsWith('text-'))
        });
      }

      if (products.length < 2) {
        showError("กรุณาเพิ่มสินค้าอย่างน้อย 2 รายการเพื่อเปรียบเทียบ");
        return;
      }

      // Find min unit price
      const minUnitPrice = Math.min(...products.map(p => p.unitPrice));
      const winners = products.filter(p => Math.abs(p.unitPrice - minUnitPrice) < 0.000001);

      resultEl.classList.remove("hidden");
      
      const formatOptions = { minimumFractionDigits: 2, maximumFractionDigits: 4 };
      
      products.forEach(p => {
        const pEl = document.createElement('p');
        pEl.className = "text-slate-300 font-medium flex justify-between items-center";
        pEl.innerHTML = `
          <span>สินค้า ${p.id}:</span>
          <span class="${p.colorClass}">${p.unitPrice.toLocaleString('th-TH', formatOptions)} บาท / หน่วย</span>
        `;
        resultListEl.appendChild(pEl);
      });

      if (winners.length === 1) {
        winnerEl.innerText = `✨ สินค้า ${winners[0].id} คุ้มค่าที่สุด!`;
        winnerEl.className = "p-4 rounded-xl font-bold text-center text-lg shadow-sm bg-slate-800 text-emerald-400 animate-bounce-short border border-emerald-900/30";
      } else if (winners.length === products.length) {
        winnerEl.innerText = "⚖️ ราคาเท่ากันทุกสินค้า";
        winnerEl.className = "p-4 rounded-xl font-bold text-center text-lg shadow-sm bg-slate-800 text-slate-400 border border-slate-700";
      } else {
        const winnerIds = winners.map(w => w.id).join(', ');
        winnerEl.innerText = `✨ สินค้า ${winnerIds} คุ้มค่าเท่ากัน!`;
        winnerEl.className = "p-4 rounded-xl font-bold text-center text-lg shadow-sm bg-slate-800 text-emerald-400 animate-bounce-short border border-emerald-900/30";
      }

      // Auto scroll to result on mobile
      resultEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function showError(msg) {
      const errorEl = document.getElementById("errorMessage");
      errorEl.innerText = msg;
      errorEl.classList.remove("hidden");
    }
  </script>

  <style>
    @keyframes bounce-short {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    .animate-bounce-short {
      animation: bounce-short 1s ease-in-out infinite;
    }
    @keyframes scale-up {
      0% { transform: scale(0.95); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .animate-scale-up {
      animation: scale-up 0.2s ease-out forwards;
    }
  </style>

</body>
</html>
